<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="RadPlan — Radiologie-Dienstplanung">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#0d1e38"/>
      <stop offset="1" stop-color="#060d1c"/>
    </radialGradient>
    <radialGradient id="cGlow" cx="256" cy="256" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nucGrad" cx="256" cy="256" r="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#c7f8ff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>
    <filter id="oGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cp">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
    <!-- Orbit paths for animateMotion (rx=150, ry=55, center=256,256) -->
    <path id="o1p" d="M 406 256 A 150 55 0 0 1 106 256 A 150 55 0 0 1 406 256"/>
    <path id="o2p" d="M 331 386 A 150 55 60 0 1 181 126 A 150 55 60 0 1 331 386"/>
    <path id="o3p" d="M 181 386 A 150 55 120 0 1 331 126 A 150 55 120 0 1 181 386"/>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <g clip-path="url(#cp)">
    <!-- Corner accent glows -->
    <circle cx="70" cy="70" r="100" fill="#1a3e7a" fill-opacity="0.13"/>
    <circle cx="442" cy="442" r="130" fill="#1a3e7a" fill-opacity="0.10"/>

    <!-- Breathing ambient glow -->
    <circle cx="256" cy="256" r="140" fill="url(#cGlow)">
      <animate attributeName="r" values="130;158;130" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1.0;0.7" dur="4.2s" repeatCount="indefinite"/>
    </circle>

    <!-- ─── ATOM ORBITS ─── -->
    <!-- Orbit 1: horizontal, cyan -->
    <ellipse cx="256" cy="256" rx="150" ry="55" fill="none"
      stroke="#22d3ee" stroke-width="3.5" stroke-opacity="0.70" filter="url(#oGlow)"/>
    <!-- Orbit 2: rotated 60°, blue -->
    <ellipse cx="256" cy="256" rx="150" ry="55" fill="none"
      stroke="#60a5fa" stroke-width="3.5" stroke-opacity="0.60" filter="url(#oGlow)"
      transform="rotate(60 256 256)"/>
    <!-- Orbit 3: rotated 120°, violet -->
    <ellipse cx="256" cy="256" rx="150" ry="55" fill="none"
      stroke="#a78bfa" stroke-width="3.5" stroke-opacity="0.55" filter="url(#oGlow)"
      transform="rotate(120 256 256)"/>

    <!-- ─── STATIC SHIFT MARKER DOTS (hexagon) ─── -->
    <!-- East  (406, 256) – cyan -->
    <circle cx="406" cy="256" r="10.5" fill="#22d3ee" filter="url(#dGlow)"/>
    <!-- NE    (331, 126) – amber -->
    <circle cx="331" cy="126" r="10.5" fill="#fbbf24" filter="url(#dGlow)"/>
    <!-- NW    (181, 126) – blue -->
    <circle cx="181" cy="126" r="10.5" fill="#3b82f6" filter="url(#dGlow)"/>
    <!-- West  (106, 256) – green -->
    <circle cx="106" cy="256" r="10.5" fill="#34d399" filter="url(#dGlow)"/>
    <!-- SW    (181, 386) – violet -->
    <circle cx="181" cy="386" r="10.5" fill="#a78bfa" filter="url(#dGlow)"/>
    <!-- SE    (331, 386) – rose -->
    <circle cx="331" cy="386" r="10.5" fill="#fb7185" filter="url(#dGlow)"/>

    <!-- ─── ORBITING ELECTRONS ─── -->
    <!-- Electron on orbit 1 (bright white) -->
    <circle r="7" fill="#ffffff" filter="url(#eGlow)">
      <animateMotion dur="3.8s" repeatCount="indefinite">
        <mpath href="#o1p"/>
      </animateMotion>
    </circle>

    <!-- Electron on orbit 2 (sky blue), offset start -->
    <circle r="7" fill="#93c5fd" filter="url(#eGlow)">
      <animateMotion dur="5.2s" repeatCount="indefinite" begin="1.1s">
        <mpath href="#o2p"/>
      </animateMotion>
    </circle>

    <!-- Electron on orbit 3 (lavender), offset start -->
    <circle r="7" fill="#c4b5fd" filter="url(#eGlow)">
      <animateMotion dur="4.5s" repeatCount="indefinite" begin="2.4s">
        <mpath href="#o3p"/>
      </animateMotion>
    </circle>

    <!-- ─── NUCLEUS ─── -->
    <!-- Pulsing outer halo -->
    <circle cx="256" cy="256" r="44" fill="#22d3ee" fill-opacity="0.08" filter="url(#nGlow)">
      <animate attributeName="r" values="40;54;40" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="0.05;0.20;0.05" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <!-- Dark ring -->
    <circle cx="256" cy="256" r="33" fill="#060d1c" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.80"/>
    <!-- Pulsing bright nucleus -->
    <circle cx="256" cy="256" r="27" fill="url(#nucGrad)" filter="url(#nGlow)">
      <animate attributeName="r" values="25;29;25" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner highlight -->
    <circle cx="249" cy="249" r="8" fill="#ffffff" fill-opacity="0.35"/>
  </g>
</svg>
