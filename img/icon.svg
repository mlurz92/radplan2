<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="RadPlan — Radiologie-Dienstplanung">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#0d1e38"/>
      <stop offset="1" stop-color="#060d1c"/>
    </radialGradient>
    <radialGradient id="cGlow" cx="512" cy="512" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nucGrad" cx="512" cy="512" r="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#c7f8ff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>
    <filter id="oGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cp">
      <rect width="1024" height="1024" rx="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <g clip-path="url(#cp)">
    <!-- Corner accent glows -->
    <circle cx="140" cy="140" r="200" fill="#1a3e7a" fill-opacity="0.13"/>
    <circle cx="884" cy="884" r="260" fill="#1a3e7a" fill-opacity="0.10"/>

    <!-- Central ambient glow -->
    <circle cx="512" cy="512" r="280" fill="url(#cGlow)"/>

    <!-- ─── ATOM ORBITS ─── -->
    <!-- Orbit 1: horizontal, cyan -->
    <ellipse cx="512" cy="512" rx="300" ry="110" fill="none"
      stroke="#22d3ee" stroke-width="6.5" stroke-opacity="0.72" filter="url(#oGlow)"/>
    <!-- Orbit 2: rotated 60°, blue -->
    <ellipse cx="512" cy="512" rx="300" ry="110" fill="none"
      stroke="#60a5fa" stroke-width="6.5" stroke-opacity="0.62" filter="url(#oGlow)"
      transform="rotate(60 512 512)"/>
    <!-- Orbit 3: rotated 120°, violet -->
    <ellipse cx="512" cy="512" rx="300" ry="110" fill="none"
      stroke="#a78bfa" stroke-width="6.5" stroke-opacity="0.57" filter="url(#oGlow)"
      transform="rotate(120 512 512)"/>

    <!-- ─── SHIFT MARKER DOTS (orbit endpoints = hexagon) ─── -->
    <!-- East  (812, 512) – cyan   | Orbit 1 -->
    <circle cx="812" cy="512" r="21" fill="#22d3ee" filter="url(#dGlow)"/>
    <!-- NE    (662, 252) – amber  | Orbit 3 -->
    <circle cx="662" cy="252" r="21" fill="#fbbf24" filter="url(#dGlow)"/>
    <!-- NW    (362, 252) – blue   | Orbit 2 -->
    <circle cx="362" cy="252" r="21" fill="#3b82f6" filter="url(#dGlow)"/>
    <!-- West  (212, 512) – green  | Orbit 1 -->
    <circle cx="212" cy="512" r="21" fill="#34d399" filter="url(#dGlow)"/>
    <!-- SW    (362, 772) – violet | Orbit 2 -->
    <circle cx="362" cy="772" r="21" fill="#a78bfa" filter="url(#dGlow)"/>
    <!-- SE    (662, 772) – rose   | Orbit 3 -->
    <circle cx="662" cy="772" r="21" fill="#fb7185" filter="url(#dGlow)"/>

    <!-- ─── INNER DOTS (at 90°/270° of each orbit) ─── -->
    <!-- Orbit 1 top    (512, 402) -->
    <circle cx="512" cy="402" r="13" fill="#67e8f9" fill-opacity="0.88"/>
    <!-- Orbit 1 bottom (512, 622) -->
    <circle cx="512" cy="622" r="13" fill="#6ee7b7" fill-opacity="0.88"/>
    <!-- Orbit 2 at 270° (607, 457) -->
    <circle cx="607" cy="457" r="13" fill="#93c5fd" fill-opacity="0.88"/>
    <!-- Orbit 2 at 90°  (417, 567) -->
    <circle cx="417" cy="567" r="13" fill="#fde68a" fill-opacity="0.88"/>
    <!-- Orbit 3 at 90°  (417, 457) -->
    <circle cx="417" cy="457" r="13" fill="#c4b5fd" fill-opacity="0.88"/>
    <!-- Orbit 3 at 270° (607, 567) -->
    <circle cx="607" cy="567" r="13" fill="#fda4af" fill-opacity="0.88"/>

    <!-- ─── NUCLEUS ─── -->
    <!-- Outer halo -->
    <circle cx="512" cy="512" r="88" fill="#22d3ee" fill-opacity="0.08" filter="url(#nGlow)"/>
    <!-- Dark ring -->
    <circle cx="512" cy="512" r="66" fill="#060d1c" stroke="#22d3ee" stroke-width="3.5" stroke-opacity="0.78"/>
    <!-- Bright nucleus -->
    <circle cx="512" cy="512" r="54" fill="url(#nucGrad)" filter="url(#nGlow)"/>
    <!-- Inner highlight -->
    <circle cx="498" cy="498" r="16" fill="#ffffff" fill-opacity="0.35"/>
  </g>
</svg>
